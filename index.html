<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Karan Chulliparambil</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&family=Rock+Salt&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      margin: 0;
      background: #e8e3da;
      font-family: 'Plus Jakarta Sans', 'Helvetica Neue', Helvetica, Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
    }

    /* ---- FULL SCREEN ---- */
    .landing {
      position: relative;
      width: 100vw;
      height: 100svh;
      min-height: 600px;
      overflow: hidden;
    }

    /* ---- BACKGROUND PHOTO ---- */
    .landing-bg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center 60%;
    }

    /* ---- SCRIM — very light wash so sketch stays visible ---- */
    .landing-scrim {
      position: absolute;
      inset: 0;
      background:
        linear-gradient(to bottom,
          rgba(232,227,218,.45) 0%,
          rgba(232,227,218,.1) 40%,
          rgba(232,227,218,.0) 100%);
    }

    /* ---- NAV ---- */
    nav {
      position: absolute;
      top: 0; left: 0; right: 0;
      z-index: 20;
      height: 72px;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      padding: 0 32px 14px;
    }

    .nav-group {
      display: flex;
      gap: 36px;
      list-style: none;
    }

    nav a {
      font-family: 'Rock Salt', cursive;
      font-size: 13px;
      font-weight: 400;
      color: rgba(30,15,50,.45);
      text-decoration: none;
      letter-spacing: 0.04em;
      text-transform: none;
      transition: color .2s;
    }
    nav a:hover { color: rgba(30,15,50,.9); }

    /* ---- HERO TITLE — right below nav, full width ---- */
    .hero-title {
      position: absolute;
      top: 72px;
      left: 0;
      right: 0;
      z-index: 20;
      padding: 8px 28px 0;
      line-height: 0.88;
    }

    .hero-name {
      display: block;
      font-family: 'Plus Jakarta Sans', 'Helvetica Neue', Helvetica, Arial, sans-serif;
      font-weight: 900;
      line-height: 0.88;
      letter-spacing: -0.02em;
      white-space: nowrap;
      color: #1e0f32;
      text-transform: uppercase;
      /* font-size set by JS */
    }

    /* ---- BOTTOM COPY — bottom left, like faceformula ---- */
    .hero-body {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      z-index: 20;
      padding: 0 32px 44px;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
    }

    .hero-copy {
      max-width: 360px;
    }

    .hero-tagline {
      font-size: clamp(22px, 3.2vw, 38px);
      font-weight: 800;
      color: rgba(255,255,255,.92);
      line-height: 1.1;
      letter-spacing: -0.02em;
      margin-bottom: 14px;
    }

    .hero-sub {
      font-size: 11px;
      font-weight: 400;
      color: rgba(255,255,255,.42);
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    /* page links bottom right */
    .hero-links {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 4px;
    }

    .hero-link {
      display: flex;
      align-items: center;
      gap: 14px;
      text-decoration: none;
      color: rgba(255,255,255,.3);
      font-size: 10.5px;
      font-weight: 800;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 3px 0;
      transition: color .2s;
    }
    .hero-link:hover { color: rgba(255,255,255,.85); }

    .hl-num {
      font-size: 9px;
      color: rgba(255,255,255,.18);
      letter-spacing: 0.1em;
    }

    .hl-arrow {
      font-size: 11px;
      opacity: 0;
      transition: opacity .2s;
    }
    .hero-link:hover .hl-arrow { opacity: 1; }

    /* ---- MOBILE ---- */
    @media (max-width: 640px) {
      nav { padding: 0 18px; }
      .hero-title { padding: 6px 18px 0; }
      .hero-body { padding: 0 18px 28px; flex-direction: column; align-items: flex-start; gap: 24px; }
      .hero-links { align-items: flex-start; }
    }
  </style>
</head>
<body>

  <div class="landing">

    <!-- Sketch background -->
    <img class="landing-bg" src="sketch-recolored.jpg" alt="" />
    <div class="landing-scrim"></div>

    <!-- Nav: all links right -->
    <nav>
      <ul class="nav-group"></ul>
      <ul class="nav-group">
        <li><a href="about.html">About</a></li>
        <li><a href="projects.html">Projects</a></li>
        <li><a href="writing.html">Writing</a></li>
        <li><a href="design.html">Design</a></li>
      </ul>
    </nav>

    <!-- Massive name — full viewport width, top of page -->
    <div class="hero-title">
      <span class="hero-name" id="heroName">Karan <span style="font-weight:300;position:relative;top:-0.06em;">—</span> Chulliparambil</span>
    </div>


  </div>

  <script>
    // Fit the name to exactly span the container width
    function fitName() {
      const el = document.getElementById('heroName');
      const container = el.parentElement;
      const style = window.getComputedStyle(container);
      const maxW = container.clientWidth
        - parseFloat(style.paddingLeft)
        - parseFloat(style.paddingRight);
      let lo = 10, hi = 1000;
      while (hi - lo > 0.25) {
        const mid = (lo + hi) / 2;
        el.style.fontSize = mid + 'px';
        el.scrollWidth > maxW ? (hi = mid) : (lo = mid);
      }
      el.style.fontSize = lo + 'px';
    }

    // Wait for Barlow to load before fitting
    document.fonts.ready.then(() => {
      fitName();
      window.addEventListener('resize', fitName);
    });

    // Entrance animations
    const heroName = document.getElementById('heroName');
    const nav = document.querySelector('nav');

    [nav, heroName].forEach((el, i) => {
      el.style.opacity = '0';
      el.style.transform = i === 1 ? 'translateY(20px)' : 'none';
      el.style.transition = `opacity ${i === 1 ? '1s' : '.7s'} ease, transform 1s ease`;
    });

    setTimeout(() => {
      nav.style.opacity = '1';
      setTimeout(() => {
        heroName.style.opacity = '1';
        heroName.style.transform = 'none';
      }, 150);
    }, 100);
  </script>

</body>
</html>
